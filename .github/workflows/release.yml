name: Release

on:
  push:
    tags:
      - "v*.*.*" # Triggers when pushing a tag like v0.1.0

permissions:
  contents: write # Needed for creating a release

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: PlotOxide-Windows.zip
          - os: macos-latest # M1/M2/M3 (arm64)
            target: aarch64-apple-darwin
            artifact_name: PlotOxide-macOS-arm64.zip
          - os: macos-latest # Cross-compile for Intel (x86_64)
            target: x86_64-apple-darwin
            artifact_name: PlotOxide-macOS-x86_64.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ==================
      # Windows Build
      # ==================
      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path target/${{ matrix.target }}/release/plot-oxide.exe -DestinationPath ${{ matrix.artifact_name }}

      # ==================
      # macOS Build
      # ==================
      - name: Install cargo-bundle (macOS)
        if: startsWith(matrix.os, 'macos')
        run: cargo install cargo-bundle

      - name: Build App Bundle (macOS)
        if: startsWith(matrix.os, 'macos')
        run: cargo bundle --release --target ${{ matrix.target }}

      - name: Ad-hoc code sign (macOS)
        if: startsWith(matrix.os, 'macos')
        run: codesign --force --deep -s - target/${{ matrix.target }}/release/bundle/osx/plot-oxide.app

      - name: Package (macOS)
        if: startsWith(matrix.os, 'macos')
        # Use `ditto` to correctly zip the .app directory structure preserving permissions.
        run: ditto -c -k --sequesterRsrc --keepParent target/${{ matrix.target }}/release/bundle/osx/plot-oxide.app ${{ matrix.artifact_name }}

      # ==================
      # Upload Artifacts
      # ==================
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all workflow run artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
